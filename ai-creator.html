<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Generator | Steven Lai</title>
    <meta name="description" content="Công cụ tạo nội dung tự động bằng AI, giúp bạn viết blog, bài đăng mạng xã hội, và email marketing nhanh chóng.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.1);
            --primary-glow: #8b5cf6;
            --secondary-glow: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.15), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #e2e8f0;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-glow);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        select option {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .col {
            flex: 1;
        }

        button.main-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button.main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.6);
        }

        button.main-btn:active {
            transform: translateY(0);
        }

        button.main-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            margin-top: 40px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .result-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--panel-border);
            padding: 8px 16px;
            font-size: 0.9rem;
            border-radius: 8px;
            width: auto;
            color: var(--text-main);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .result-content {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 24px;
            line-height: 1.6;
            color: #f1f5f9;
        }

        .result-content p {
            margin-bottom: 12px;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .row {
                flex-direction: column;
                gap: 0;
            }
            .container {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>AI Content Creator</h1>
            <p>Tạo nội dung chất lượng cao chỉ trong vài giây</p>
        </div>

        <div class="form-group">
            <label for="topic">Chủ đề / Yêu cầu của bạn</label>
            <textarea id="topic" placeholder="Ví dụ: Viết một bài đăng Facebook giới thiệu về khóa học làm nail cơ bản dành cho người mới bắt đầu..."></textarea>
        </div>

        <div class="row">
            <div class="col form-group">
                <label for="type">Loại nội dung</label>
                <select id="type">
                    <option value="Bài viết Blog chuẩn SEO">Bài viết Blog</option>
                    <option value="Bài đăng Mạng xã hội (Facebook/Instagram)">Mạng xã hội</option>
                    <option value="Email Marketing">Email Marketing</option>
                    <option value="Mô tả sản phẩm">Mô tả sản phẩm</option>
                    <option value="Kịch bản Video ngắn (Tiktok/Reels)">Kịch bản Video ngắn</option>
                </select>
            </div>
            <div class="col form-group">
                <label for="tone">Giọng văn</label>
                <select id="tone">
                    <option value="Chuyên nghiệp, lịch sự">Chuyên nghiệp</option>
                    <option value="Thân thiện, gần gũi">Thân thiện</option>
                    <option value="Hài hước, sáng tạo">Hài hước</option>
                    <option value="Thuyết phục, chốt sale">Thuyết phục (Sale)</option>
                </select>
            </div>
        </div>

        <button class="main-btn" id="generateBtn" onclick="generateContent()">
            <span id="btnText">✨ Tạo Nội Dung Ngay</span>
            <div class="loader" id="loader"></div>
        </button>

        <div class="result-container" id="resultContainer">
            <div class="result-header">
                <div class="result-title">Kết quả của bạn:</div>
                <button class="copy-btn" onclick="copyContent()">📋 Sao chép</button>
            </div>
            <div class="result-content" id="resultText"></div>
        </div>
    </div>

    <script>
        // Sử dụng API Key người dùng cung cấp
        const API_KEY = 'AIzaSyAv3NMMowOlwNdRdyt3smhQQY9xYA0kQDE';

        async function generateContent() {
            const topic = document.getElementById('topic').value.trim();
            const type = document.getElementById('type').value;
            const tone = document.getElementById('tone').value;

            if (!topic) {
                alert('Vui lòng nhập chủ đề bạn muốn viết nhé!');
                return;
            }

            // Xây dựng Prompt gửi cho AI
            const prompt = `Bạn là một chuyên gia Copywriter xuất sắc.
Hãy viết một ${type} về chủ đề: "${topic}".
Yêu cầu về giọng văn: ${tone}.
Ngôn ngữ: Tiếng Việt.
Vui lòng không giải thích gì thêm, chỉ cần xuất ra kết quả nội dung trực tiếp, có sử dụng emoji phù hợp nếu cần thiết để bài viết sinh động hơn.`;

            const generateBtn = document.getElementById('generateBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('resultContainer');
            const resultText = document.getElementById('resultText');

            // Bật trạng thái Loading
            generateBtn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            resultContainer.style.display = 'none';

            try {
                // Gọi API Gemini 2.5 Flash
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: prompt }]
                        }],
                        generationConfig: {
                            temperature: 0.7, // Độ sáng tạo
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`Lỗi kết nối API (${response.status})`);
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates.length > 0) {
                    const generatedText = data.candidates[0].content.parts[0].text;
                    resultText.innerHTML = formatMarkdownToHTML(generatedText);
                    resultContainer.style.display = 'block';
                    
                    // Cuộn trang xuống kết quả
                    resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    alert('Không thể tạo nội dung. Vui lòng thử lại.');
                }
            } catch (error) {
                console.error(error);
                alert('Đã xảy ra lỗi: ' + error.message);
            } finally {
                // Tắt trạng thái Loading
                generateBtn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        // Hàm hỗ trợ format Markdown cơ bản của Gemini thành HTML
        function formatMarkdownToHTML(text) {
            let html = text
                // Format in đậm **text**
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // Format in nghiêng *text*
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                // Format Heading (## Heading)
                .replace(/^(#{1,3})\s+(.*)$/gm, (match, p1, p2) => {
                    const level = p1.length + 2; // Biến ## thành <h4> cho đỡ to
                    return `<h${level} style="margin-top: 15px; margin-bottom: 8px;">${p2}</h${level}>`;
                });
                
            // Xử lý xuống dòng
            return html.split('\n').map(line => {
                if (line.trim() === '') return '<br>';
                if (line.match(/^<h/)) return line;
                return `<p>${line}</p>`;
            }).join('');
        }

        function copyContent() {
            // Lấy text thuần từ div kết quả
            const textToCopy = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '✅ Đã chép!';
                copyBtn.style.background = 'rgba(16, 185, 129, 0.2)';
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.style.background = '';
                }, 2000);
            }).catch(err => {
                console.error('Không thể sao chép: ', err);
                alert('Trình duyệt của bạn không hỗ trợ sao chép tự động.');
            });
        }
    </script>
</body>
</html>
